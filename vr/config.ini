# Isaac Lab虚拟手控制系统配置文件

[network]
# 网络设置
host = 0.0.0.0
port = 8888
timeout = 0.1

[tracking]
# 手部追踪参数
update_rate = 60  # Hz

# 坐标转换参数
position_scale = 2.0
position_offset_x = 0.5
position_offset_y = 0.0
position_offset_z = 0.5

# 旋转转换 (是否需要额外的旋转变换)
apply_rotation_transform = false

[grasping]
# 抓取参数
pinch_threshold = 0.6  # 捏合强度阈值 (0-1)
grasp_distance = 0.15  # 抓取距离阈值 (米)
release_delay = 0.1    # 释放延迟 (秒)

[visualization]
# 可视化设置
left_hand_color = [0.2, 0.6, 0.8]   # RGB
right_hand_color = [0.8, 0.6, 0.2]  # RGB
hand_size = [0.08, 0.04, 0.15]      # 手的尺寸 [长, 宽, 高]

# 显示调试信息
show_debug_info = true
debug_print_interval = 100  # 每N帧打印一次

[scene]
# 场景设置
num_envs = 1
env_spacing = 2.0

# 对象初始位置
cube_position = [0.5, 0.0, 0.3]
sphere_position = [0.7, 0.2, 0.3]

# 对象物理属性
object_mass = 0.5
object_friction = 0.8

[performance]
# 性能设置
physics_dt = 0.01  # 物理仿真时间步长
render_dt = 0.033  # 渲染时间步长 (30 FPS)

# 多线程设置
use_multithreading = true
num_threads = 4

[advanced]
# 高级设置
enable_collision_detection = true
enable_self_collision = false
use_gpu_pipeline = true

# 平滑滤波
enable_position_smoothing = true
smoothing_factor = 0.3

# 预测算法
enable_prediction = false
prediction_time = 0.05  # 秒
