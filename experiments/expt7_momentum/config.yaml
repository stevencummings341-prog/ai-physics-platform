# Experiment 7 — Momentum Conservation (1D elastic/inelastic collision on track)

# Masses (kg)
m1: 0.25
m2: 0.25

# Initial X-velocities (m/s)
v1_init: 0.30
v2_init: 0.00

# Collision elasticity: 1.0 = perfectly elastic, 0.0 = perfectly inelastic
restitution: 1.0

# Timing
physics_dt: 0.004167    # 1/240 s
render_dt:  0.016667    # 1/60 s  (VR: set to 0.01111 = 1/90)
sim_time:   6.0          # auto-adjusted at runtime based on approach speed
warmup_seconds: 0.5

# Geometry
cart_size: [0.45, 0.22, 0.15]
cart1_x: -0.85
cart2_x:  0.35
track_length: 8.0
track_width:  0.30

# Display
headless: false
enable_livestream: false
